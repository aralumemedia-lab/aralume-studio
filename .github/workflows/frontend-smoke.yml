name: frontend-smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: npm run build

      - name: Release smoke
        run: npm run release:smoke

      - name: Browser acceptance
        run: npm run release:browser
